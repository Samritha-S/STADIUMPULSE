<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StadiumPulse — Control Room Dashboard</title>
  <meta name="description" content="StadiumPulse real-time crowd safety dashboard for FIFA World Cup 2026 stadium operations.">
  <!-- Fonts: Space Grotesk · Inter · JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <div class="logo-container">
      <!-- Radar-sweep pulse dot — animation defined in CSS, syncs to 3 s poll interval -->
      <span class="logo-pulse" aria-hidden="true"></span>
      <h1 class="app-title">StadiumPulse</h1>
      <span class="badge badge-ops">OPS CENTER</span>
      <span class="badge badge-live" id="live-indicator" aria-live="polite" aria-label="Live polling status">● LIVE</span>
    </div>
    <div class="header-meta">
      <time class="system-time" id="clock" aria-label="Current UTC time">2026-07-18 00:00:00 UTC</time>
      <button class="btn btn-primary" id="refresh-btn" aria-label="Refresh dashboard data">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 7.89M21 8h-5V3" />
        </svg>
        Refresh Data
      </button>
    </div>
  </header>

  <main class="dashboard-layout">
    <!-- Zone Monitoring Panel -->
    <section class="panel-section zone-monitoring" aria-labelledby="zone-section-title">
      <header class="panel-header">
        <h2 id="zone-section-title">Stadium Zone Monitoring</h2>
        <p class="section-description">Real-time crowd flow status and capacity tracking</p>
      </header>
      <!-- Zone cards rendered by app.js into this grid container.
           Each card gets data-zone-id and data-status attributes for CSS stripe targeting. -->
      <div class="zone-grid" id="zone-grid-container" aria-live="polite" aria-label="Zone status cards">
        <div class="loading-state">Loading zone status…</div>
      </div>
    </section>

    <!-- Operational Brief Feed (log ticker strip) -->
    <section class="panel-section brief-feed" aria-labelledby="brief-section-title">
      <header class="panel-header">
        <h2 id="brief-section-title">GenAI Operational Briefs</h2>
        <p class="section-description">Automated response briefings and routing recommendations</p>
      </header>
      <!-- aria-live="polite" announces new briefs to screen readers on each poll cycle -->
      <div class="feed-container" id="brief-feed-container" aria-live="polite" aria-label="Operational briefings feed">
        <div class="loading-state">Loading briefings…</div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
