<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StadiumPulse — Incident Report Portal</title>
  <meta name="description" content="Submit field incident reports for automated triage at MetLife Stadium.">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="report-body">

  <main class="report-stage" role="main">
    <div class="report-card" id="compose-card">
      <div class="dispatch-label">Incident Dispatch</div>
      <h1 class="portal-title">Report</h1>
      <p class="portal-desc">Describe what you see. AI will detect location, category, and severity automatically.</p>

      <form id="incident-form" class="incident-form" novalidate>
        <div class="form-group">
          <label for="raw_text" class="input-label">Incident Details</label>
          <div class="textarea-wrapper">
            <textarea
              id="raw_text"
              name="raw_text"
              rows="8"
              placeholder="e.g., Man down near section 112, looks like heat exhaustion..."
              required
              aria-describedby="text-help char-counter"
            ></textarea>
            <div id="char-counter" class="char-counter" aria-live="polite">0 / 1000</div>
          </div>
          <div id="text-help" class="input-help">Include level, gate, or section if possible. (Max 1000 characters)</div>
        </div>

        <div id="form-error" class="error-banner" role="alert" aria-live="assertive" style="display: none;"></div>

        <button type="submit" id="submit-btn" class="submit-btn">
          <span id="btn-text">Submit Incident</span>
          <span id="btn-loader" class="loader" style="display: none;"></span>
          <svg class="submit-arrow" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5-5 5M6 12h12"/></svg>
        </button>
      </form>
    </div>

    <!-- Confirmation panel: shown after successful submit -->
    <div id="confirmation-panel" class="confirmation-panel" role="region" aria-live="polite" style="display: none;">
      <div class="confirm-check-wrapper">
        <svg class="confirm-check-svg" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="32" cy="32" r="30" stroke="#4A7856" stroke-width="3"/>
          <path d="M20 32l8 8 16-16" stroke="#4A7856" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h2 class="confirm-title">Dispatched</h2>
      <p id="confirm-summary" class="confirm-summary">Automated triage summary: processing...</p>
      <div class="triage-tags">
        <span class="tag tag-category" id="tag-category">Category</span>
        <span class="tag tag-severity" id="tag-severity">Severity</span>
        <span class="tag tag-zone" id="tag-zone">Zone</span>
      </div>
      <button type="button" id="reset-btn" class="reset-btn">Submit Another Report</button>
    </div>
  </main>

  <script src="app.js"></script>
  <script src="session-nav.js"></script>
</body>
</html>
